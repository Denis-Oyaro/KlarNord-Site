<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KlarNord – Tak</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/jpeg" href="/logo.jpg">
<link rel="apple-touch-icon" href="/logo.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <a class="logo" href="/">
    <span class="logo-text">Klar<span class="logo-accent">Nord</span></span>
  </a>
</header>

<section style="min-height:80vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:64px 6%; background:var(--bg-alt);">
  <div style="max-width:520px;">
    <div style="width:72px;height:72px;background:var(--blue-light);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 32px;">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1 style="font-size:clamp(28px,5vw,40px);margin-bottom:16px;" data-i18n="thank_title"></h1>
    <p style="font-size:18px;color:var(--text);margin-bottom:40px;" data-i18n="thank_text"></p>
    <a href="/" class="btn" data-i18n="thank_btn"></a>
  </div>
</section>

<script>
const translations = {
  da: {
    thank_title: "Tak for din besked!",
    thank_text: "Vi vender tilbage til dig hurtigst muligt.",
    thank_btn: "Tilbage til forsiden"
  },
  en: {
    thank_title: "Thank you for your message!",
    thank_text: "We will get back to you as soon as possible.",
    thank_btn: "Back to homepage"
  }
};

function setLang(lang) {
  const dict = translations[lang];
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (dict[key] !== undefined) el.textContent = dict[key];
  });
}

setLang(localStorage.getItem("lang") || "da");
</script>

</body>
</html>
