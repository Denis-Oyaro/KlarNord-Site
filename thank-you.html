<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Thank You</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<section style="text-align:center; padding:100px 20px;">
  <h1 data-i18n="thank_title"></h1>
  <p data-i18n="thank_text"></p>

  <a href="/" class="btn" data-i18n="thank_btn"></a>
</section>

<script>
const translations = {
  da: {
    thank_title: "Tak for din besked!",
    thank_text: "Vi vender tilbage til dig hurtigst muligt.",
    thank_btn: "Tilbage til forsiden"
  },
  en: {
    thank_title: "Thank you for your message!",
    thank_text: "We will get back to you as soon as possible.",
    thank_btn: "Back to homepage"
  }
};

function setLang(lang){
  const dict = translations[lang];

  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (dict[key]) el.textContent = dict[key];
  });
}

setLang(localStorage.getItem("lang") || "da");
</script>

</body>
</html>
