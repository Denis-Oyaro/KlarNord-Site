<script>
// Testimonial slider
const testimonials = document.querySelectorAll(".testimonial");
const dots = document.querySelectorAll(".dot");
let testimonialIndex = 0;

function showTestimonial(i) {
  testimonials.forEach(t => t.classList.remove("active"));
  dots.forEach(d => d.classList.remove("active"));
  testimonials[i].classList.add("active");
  dots[i].classList.add("active");
  testimonialIndex = i;
}

let autoplay = setInterval(advance, 6000);

function advance() {
  showTestimonial((testimonialIndex + 1) % testimonials.length);
}

function resetAutoplay() {
  clearInterval(autoplay);
  autoplay = setInterval(advance, 6000);
}

// Touch swipe
const slider = document.querySelector(".testimonial-slider");
let touchStartX = 0;

slider.addEventListener("touchstart", e => {
  touchStartX = e.changedTouches[0].clientX;
  clearInterval(autoplay);
}, { passive: true });

slider.addEventListener("touchend", e => {
  const delta = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(delta) > 50) {
    showTestimonial(delta > 0
      ? (testimonialIndex + 1) % testimonials.length
      : (testimonialIndex - 1 + testimonials.length) % testimonials.length);
  }
  resetAutoplay();
}, { passive: true });

// Scroll fade-in animations
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add("visible");
      observer.unobserve(e.target);
    }
  });
}, { threshold: 0.08 });

document.querySelectorAll(".fade-up").forEach(el => observer.observe(el));
</script>

function setLang(lang) {
  const dict = translations[lang];

  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (dict[key] !== undefined) el.textContent = dict[key];
  });

  document.querySelectorAll("[data-placeholder]").forEach(el => {
    const key = el.getAttribute("data-placeholder");
    if (dict[key] !== undefined) el.placeholder = dict[key];
  });

  document.querySelectorAll(".lang-btn").forEach(btn => btn.classList.remove("active"));
  const activeBtn = document.getElementById("btn-" + lang);
  if (activeBtn) activeBtn.classList.add("active");

  localStorage.setItem("lang", lang);
}

document.addEventListener("DOMContentLoaded", () => {
  setLang(localStorage.getItem("lang") || "da");
});

// TEMP DIAGNOSTIC
window.addEventListener("load", () => {
  const vw = document.documentElement.clientWidth;
  const found = [];
  document.querySelectorAll("*").forEach(el => {
    const r = el.getBoundingClientRect();
    if (r.right > vw + 1) {
      found.push((el.className || el.tagName) + " → " + Math.round(r.right) + "px (viewport " + vw + "px)");
    }
  });
  const box = document.createElement("div");
  box.style.cssText = "position:fixed;bottom:0;left:0;right:0;background:#c00;color:#fff;font-size:12px;padding:10px 14px;z-index:99999;white-space:pre-line;max-height:50vh;overflow-y:auto;";
  box.textContent = found.length ? found.join("\n") : "✓ No overflow detected";
  document.body.appendChild(box);
});
